services:
  db:
    image: mysql:8.0
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_storage:/var/lib/mysql
    ports:
      - "3306:3306"  # เปิดให้เครื่อง Windows/เพื่อน มุดมาต่อ SQL ตรงๆ
    networks:
      - main_shared_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mysql_ui
    restart: always
    environment:
      PMA_HOST: db
      PMA_ABSOLUTE_URI: /pma/ # ใช้ Relative Path เพื่อความยืดหยุ่นเรื่องโดเมน
    networks:
      - main_shared_network #เพราะจะให้ Nginx เรียกผ่าน Network ภายใน
    env_file:
      - .env

networks:
  main_shared_network:
    external: true

volumes:
  db_storage: